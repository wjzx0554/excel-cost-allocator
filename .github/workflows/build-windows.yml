name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            artifact: ExcelCostAllocator-win-x86
          - arch: x64
            artifact: ExcelCostAllocator-win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip<25"
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest

      - name: Build exe
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name ExcelCostAllocator main.py
          mkdir artifact
          copy dist\ExcelCostAllocator.exe artifact\ExcelCostAllocator-${{ matrix.arch }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact\*.exe
